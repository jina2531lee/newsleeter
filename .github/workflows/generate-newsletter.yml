name: 주간 AI 뉴스레터 자동 발행

on:
  schedule:
    # 매주 토요일 오전 6시 KST (금요일 21:00 UTC)
    - cron: "0 21 * * 5"
  workflow_dispatch: # 수동 실행 버튼

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: 패키지 설치
        run: npm ci

      - name: 뉴스레터 생성 및 발행
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEWSLETTER_API_URL: ${{ secrets.NEWSLETTER_API_URL }}
          NEWSLETTER_API_SECRET: ${{ secrets.NEWSLETTER_API_SECRET }}
        run: npx tsx scripts/generate-newsletter.ts
